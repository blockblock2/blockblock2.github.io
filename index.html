<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF8C1A;
    --purple: #855CD6;
    --blue: #4C97FF;
    --yellow: #FFD23F;
    --ink: #1C2540;
    --paper: #FDF8F1;
    --card: #FFFFFF;
    --muted: rgba(28, 37, 64, 0.6);
    --shadow: 0 6px 0 rgba(28, 37, 64, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  header { text-align: center; padding: 60px 20px 12px; }
  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
  }
  header h1 .spark { color: var(--orange); }
  header p {
    margin-top: 10px;
    font-size: 1.05rem;
    color: var(--muted);
  }

  .folders {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
    gap: 40px 32px;
    max-width: 860px;
    margin: 40px auto 0;
    padding: 12px 24px 80px;
    justify-items: center;
  }

  /* ---- Folder tile ---- */
  .folder {
    position: relative;
    width: 100%;
    max-width: 360px;
    background: var(--tab, var(--orange));
    border: 3px solid var(--ink);
    border-radius: 6px 16px 16px 16px;
    box-shadow: var(--shadow);
    text-decoration: none;
    color: var(--ink);
    padding: 14px;
    display: block;
    transition: transform 0.15s ease;
  }
  .folder:hover { transform: translateY(-5px); }

  /* the little folder tab on top */
  .folder::before {
    content: "";
    position: absolute;
    top: -16px;
    left: 18px;
    width: 90px;
    height: 18px;
    background: var(--tab, var(--orange));
    border: 3px solid var(--ink);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  .folder:nth-child(1) { --tab: var(--orange); }
  .folder:nth-child(2) { --tab: var(--purple); }
  .folder:nth-child(3) { --tab: var(--blue); }
  .folder:nth-child(4) { --tab: var(--yellow); }

  .folder-body {
    background: var(--card);
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 22px 18px;
    text-align: center;
    min-height: 230px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .folder-icon { width: 92px; height: 92px; }
  .folder-icon svg { width: 100%; height: 100%; display: block; }
  .folder-emoji { font-size: 62px; line-height: 1; }

  .folder-body h2 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    margin-top: 6px;
  }
  .folder-body p {
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.35;
  }
  .go {
    margin-top: 10px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: #fff;
    background: var(--tab, var(--orange));
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 7px 18px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }

  /* Coming-soon folder is calmer and not clickable */
  .folder.soon { cursor: default; opacity: 0.92; }
  .folder.soon:hover { transform: none; }
  .folder.soon .go { background: var(--muted); }

  footer {
    text-align: center;
    padding: 0 20px 48px;
    font-size: 0.9rem;
    color: var(--muted);
  }
</style>
</head>
<body>

  <!-- Change this title to whatever you want your hub to be called -->

  <p>Pick a folder to open one!</p>
