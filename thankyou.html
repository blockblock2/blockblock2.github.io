<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! - Ancient Mythteries</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e0f7f6;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border: 3px solid #2aafaa;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            box-shadow: 6px 6px 0 #2aafaa;
        }
        .emoji { font-size: 64px; margin-bottom: 16px; }
        h1 {
            font-family: 'Bangers', cursive;
            font-size: 48px;
            letter-spacing: 2px;
            color: #2aafaa;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #6b4c2a;
            line-height: 1.7;
            margin-bottom: 28px;
        }
        a {
            display: inline-block;
            background: #e8620a;
            color: #fff;
            text-decoration: none;
            font-family: 'Bangers', cursive;
            font-size: 20px;
            letter-spacing: 1.5px;
            padding: 14px 32px;
            border-radius: 12px;
            box-shadow: 4px 4px 0 #b03d18;
            transition: all 0.2s;
        }
        a:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #b03d18;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🌿</div>
        <h1>Story Received!</h1>
        <p>Thanks for sending your story to Ancient Mythteries! We'll read it and let you know if it gets added.</p>
        <a href="https://blockblock2.github.io/ancient-mythteries-kids.html">← Back to the site</a>
    </div>
</body>
</html>
