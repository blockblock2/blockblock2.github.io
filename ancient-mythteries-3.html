<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Mythteries</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0e0c;
            color: #e8e0d0;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 80px 24px 60px;
            border-bottom: 1px solid #2a2620;
        }

        .eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c4843a;
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 400;
            color: #f0e8d8;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        header p {
            margin-top: 16px;
            font-size: 15px;
            color: #8a8070;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .listen-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .listen-links a {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #8a8070;
            text-decoration: none;
            border: 1px solid #2a2620;
            padding: 8px 18px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .listen-links a:hover {
            border-color: #c4843a;
            color: #c4843a;
        }

        /* ── EPISODES ── */
        .episodes-section {
            max-width: 760px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c4843a;
            margin-bottom: 40px;
        }

        .episode-card {
            border-top: 1px solid #2a2620;
            padding: 32px 0;
            display: grid;
            grid-template-columns: 48px 1fr;
            gap: 24px;
            align-items: start;
        }

        .ep-number {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: #c4843a;
            padding-top: 3px;
        }

        .ep-body h2 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: 400;
            color: #f0e8d8;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .ep-date {
            font-size: 12px;
            color: #5a5448;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .ep-desc {
            font-size: 14px;
            color: #8a8070;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            height: 36px;
            outline: none;
            filter: invert(1) sepia(1) saturate(0.3) hue-rotate(5deg) brightness(0.7);
            border-radius: 2px;
        }

        .no-episodes {
            border-top: 1px solid #2a2620;
            padding: 48px 0;
            color: #5a5448;
            font-size: 14px;
        }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid #2a2620;
            text-align: center;
            padding: 32px 24px;
            font-size: 12px;
            color: #3a3630;
            letter-spacing: 1px;
        }

        /* ── HIDDEN EPISODE DATA ── */
        episode { display: none; }
    </style>
</head>
<body>

<header>
    <p class="eyebrow">A Podcast</p>
    <h1>Ancient Mythteries</h1>
    <p>Exploring the hidden stories and forgotten mysteries of ancient civilizations.</p>
    <div class="listen-links">
        <a href="https://podcasts.apple.com">Apple Podcasts</a>
        <a href="https://open.spotify.com">Spotify</a>
        <a href="https://www.youtube.com">YouTube</a>
    </div>
</header>

<main class="episodes-section">
    <p class="section-label">Episodes</p>
    <div id="episode-list"></div>
</main>

<footer>
    &copy; 2024 Ancient Mythteries
</footer>


<!-- ============================================================
     ADD YOUR EPISODES BELOW — copy a block and fill it in
     
     number  = episode number (e.g. 3)
     title   = episode title
     date    = publish date (e.g. July 4, 2024)
     audio   = link to your audio file (Google Drive, Anchor, Buzzsprout, etc.)
     
     The text between the tags is the episode description.
     ============================================================ -->



<!-- ADD MORE EPISODES ABOVE THIS LINE -->


<script>
    const episodes = Array.from(document.querySelectorAll('episode'))
        .sort((a, b) => Number(b.getAttribute('number')) - Number(a.getAttribute('number')));

    const list = document.getElementById('episode-list');

    if (episodes.length === 0) {
        list.innerHTML = '<p class="no-episodes">No episodes yet — add your first one below the comment in the HTML.</p>';
    } else {
        episodes.forEach(ep => {
            const num    = ep.getAttribute('number');
            const title  = ep.getAttribute('title');
            const date   = ep.getAttribute('date');
            const audio  = ep.getAttribute('audio');
            const desc   = ep.textContent.trim();

            const card = document.createElement('div');
            card.className = 'episode-card';
            card.innerHTML = `
                <div class="ep-number">EP ${num}</div>
                <div class="ep-body">
                    <h2>${title}</h2>
                    <p class="ep-date">${date}</p>
                    <p class="ep-desc">${desc}</p>
                    ${audio ? `<audio controls src="${audio}"></audio>` : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }
</script>

</body>
</html>
