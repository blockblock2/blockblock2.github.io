<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Live Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #0c3b2a;
    --pitch-deep: #082b1f;
    --chalk: #f2f0e6;
    --chalk-dim: rgba(242, 240, 230, 0.55);
    --gold: #e3b23c;
    --live: #ff4438;
    --card: rgba(255, 255, 255, 0.05);
    --card-line: rgba(242, 240, 230, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at 50% -10%, var(--pitch) 0%, var(--pitch-deep) 70%);
    min-height: 100vh;
    color: var(--chalk);
    font-family: "Archivo", sans-serif;
    padding-bottom: 4rem;
  }
  .field-mark {
    position: fixed;
    top: -240px; left: 50%;
    transform: translateX(-50%);
    width: 620px; height: 620px;
    border: 2px solid rgba(242, 240, 230, 0.06);
    border-radius: 50%;
    pointer-events: none;
  }
  header { text-align: center; padding: 3.5rem 1rem 2rem; position: relative; }
  .eyebrow {
    letter-spacing: 0.35em; text-transform: uppercase;
    font-size: 0.72rem; color: var(--gold); font-weight: 700;
  }
  h1 {
    font-family: "Anton", sans-serif;
    font-size: clamp(2.6rem, 8vw, 4.6rem);
    letter-spacing: 0.02em; text-transform: uppercase;
    line-height: 1.05; margin-top: 0.5rem;
  }
  .subtitle { color: var(--chalk-dim); margin-top: 0.6rem; font-size: 0.95rem; }
  #status-line {
    margin-top: 0.9rem; font-size: 0.72rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--chalk-dim);
  }
  #status-line .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold); margin-right: 0.45rem; vertical-align: 1px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  #status-line.error { color: var(--live); }
  main { max-width: 860px; margin: 0 auto; padding: 0 1rem; }
  section { margin-top: 2.6rem; }
  .section-label {
    display: flex; align-items: center; gap: 0.9rem;
    text-transform: uppercase; letter-spacing: 0.25em;
    font-size: 0.72rem; font-weight: 700; color: var(--chalk-dim);
    margin-bottom: 1rem;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--card-line); }
  .match {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--card-line);
    border-radius: 10px;
    padding: 1.1rem 1.3rem;
    margin-bottom: 0.7rem;
  }
  .match.live { border-color: var(--live); box-shadow: 0 0 24px rgba(255, 68, 56, 0.18); }
  .team { display: flex; align-items: center; gap: 0.7rem; min-width: 0; }
  .team.away { justify-content: flex-end; text-align: right; }
  .flag { width: 30px; height: 30px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
  .name { font-weight: 700; font-size: 1.02rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score {
    font-family: "Anton", sans-serif;
    font-size: 2.1rem; letter-spacing: 0.06em;
    display: flex; align-items: baseline; gap: 0.55rem;
    padding: 0 0.4rem;
  }
  .score .dash { color: var(--chalk-dim); font-size: 1.3rem; }
  .score .pens { font-family: "Archivo", sans-serif; font-size: 0.78rem; color: var(--chalk-dim); }
  .score.vs { font-size: 1rem; color: var(--chalk-dim); font-family: "Archivo", sans-serif; font-weight: 500; }
  .meta {
    grid-column: 1 / -1;
    display: flex; justify-content: space-between; align-items: center;
    gap: 0.6rem; flex-wrap: wrap;
    margin-top: 0.55rem; padding-top: 0.55rem;
    border-top: 1px dashed var(--card-line);
    font-size: 0.78rem; color: var(--chalk-dim);
  }
  .round { text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .badge.live { color: var(--live); }
  .badge.live::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--live);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.35; transform: scale(0.8);} }
  .badge.ft { color: var(--chalk-dim); }
  .pbp { grid-column: 1 / -1; margin-top: 0.55rem; }
  .pbp summary {
    cursor: pointer; user-select: none; list-style: none;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--chalk-dim);
  }
  .pbp summary::-webkit-details-marker { display: none; }
  .pbp summary::before { content: "▸ "; color: var(--gold); }
  .pbp[open] summary::before { content: "▾ "; }
  .events {
    margin-top: 0.7rem; margin-left: 0.35rem;
    border-left: 2px dotted var(--card-line);
    padding-left: 0.9rem;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .event {
    display: grid; grid-template-columns: 3.2rem 1.5rem 1fr;
    align-items: baseline; gap: 0.4rem; font-size: 0.86rem;
  }
  .event .min { font-family: "Anton", sans-serif; letter-spacing: 0.05em; color: var(--gold); }
  .event.goal .text { font-weight: 700; }
  .event .icon { text-align: center; }
  .empty { color: var(--chalk-dim); font-size: 0.9rem; padding: 0.4rem 0.2rem; }
  footer { text-align: center; margin-top: 3.5rem; font-size: 0.78rem; color: var(--chalk-dim); padding: 0 1rem; }
  @media (prefers-reduced-motion: reduce) { .badge.live::before, #status-line .dot { animation: none; } }
  @media (max-width: 480px) {
    .match { padding: 0.9rem 0.9rem; }
    .name { font-size: 0.88rem; }
    .score { font-size: 1.6rem; }
    .flag { width: 24px; height: 24px; }
  }
</style>
</head>
<body>
<div class="field-mark"></div>
<header>
  <div class="eyebrow">FIFA World Cup 2026 · USA · Canada · Mexico</div>
  <h1>Live Scoreboard</h1>
  <div class="subtitle">Final at MetLife Stadium — Sunday, July 19</div>
  <div id="status-line"><span class="dot"></span><span id="status-text">Loading scores…</span></div>
</header>

<main>
  <section id="live-section" hidden>
    <div class="section-label">Live now</div>
    <div id="live"></div>
  </section>
  <section id="upcoming-section" hidden>
    <div class="section-label">Coming up</div>
    <div id="upcoming"></div>
  </section>
  <section id="results-section" hidden>
    <div class="section-label">Results</div>
    <div id="results"></div>
  </section>
</main>

<footer>Scores &amp; play-by-play via ESPN's public scoreboard feed · updates automatically</footer>

<script>
/* ================= config ================= */
// Date window to show (knockout rounds). Widen to 20260611-20260719 for the whole tournament.
const DATE_RANGE = "20260704-20260719";
const API = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=${DATE_RANGE}`;
const REFRESH_LIVE_MS = 30_000;   // poll every 30s while a match is live
const REFRESH_IDLE_MS = 300_000;  // every 5 min otherwise
/* ========================================== */

const openPbps = new Set(); // remember which finished-match timelines the user opened

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function roundName(ev) {
  const note = ev.competitions?.[0]?.altGameNote || "";
  const m = note.replace(/^FIFA World Cup,?\s*/i, "").trim();
  return m || "World Cup";
}

function eventIcon(d) {
  if (d.redCard) return "🟥";
  if (d.yellowCard) return "🟨";
  if (d.scoringPlay || /goal/i.test(d.type?.text || "")) return "⚽";
  if (/sub/i.test(d.type?.text || "")) return "🔁";
  return "•";
}

function eventText(d, teamsById) {
  const who = (d.athletesInvolved || []).map(a => a.displayName).join(", ");
  const team = teamsById[d.team?.id] || "";
  let label = d.type?.text || "Event";
  if (d.ownGoal) label = "Own goal";
  else if (d.penaltyKick && d.scoringPlay) label = "Goal (penalty)";
  const parts = [label];
  if (who) parts.push("— " + who);
  if (team) parts.push(`(${team})`);
  return parts.join(" ");
}

function renderPbp(comp, teamsById, isLive, id) {
  const details = (comp.details || []).slice()
    .sort((a, b) => (a.clock?.value ?? 0) - (b.clock?.value ?? 0));
  if (!details.length) return "";
  const rows = details.map(d => `
    <div class="event ${d.scoringPlay ? "goal" : ""}">
      <span class="min">${esc(d.clock?.displayValue || "")}</span>
      <span class="icon">${eventIcon(d)}</span>
      <span class="text">${esc(eventText(d, teamsById))}</span>
    </div>`).join("");
  const open = isLive || openPbps.has(id) ? "open" : "";
  return `<details class="pbp" ${open} data-pbp="${esc(id)}">
    <summary>Play-by-play</summary>
    <div class="events">${rows}</div>
  </details>`;
}

function renderMatch(ev) {
  const comp = ev.competitions?.[0] || {};
  const state = comp.status?.type?.state || "pre"; // pre | in | post
  const home = (comp.competitors || []).find(c => c.homeAway === "home") || {};
  const away = (comp.competitors || []).find(c => c.homeAway === "away") || {};
  const teamsById = {};
  for (const c of comp.competitors || []) teamsById[c.team?.id] = c.team?.shortDisplayName || c.team?.displayName;

  const teamHtml = (c, cls) => `
    <div class="team ${cls}">
      ${cls === "away" ? `<span class="name">${esc(c.team?.displayName || "TBD")}</span>` : ""}
      ${c.team?.logo ? `<img class="flag" src="${esc(c.team.logo)}" alt="">` : ""}
      ${cls !== "away" ? `<span class="name">${esc(c.team?.displayName || "TBD")}</span>` : ""}
    </div>`;

  let scoreHtml;
  if (state === "pre") {
    scoreHtml = `<div class="score vs">vs</div>`;
  } else {
    const pens = home.shootoutScore != null && away.shootoutScore != null
      ? `<span class="pens">(${esc(home.shootoutScore)}–${esc(away.shootoutScore)} pens)</span>` : "";
    scoreHtml = `<div class="score"><span>${esc(home.score ?? "")}</span><span class="dash">–</span><span>${esc(away.score ?? "")}</span>${pens}</div>`;
  }

  const clock = comp.status?.displayClock;
  const badge = state === "in" ? `<span class="badge live">Live ${esc(clock || "")}</span>`
    : state === "post" ? `<span class="badge ft">${esc(comp.status?.type?.shortDetail || "FT")}</span>`
    : "";

  const when = new Date(ev.date).toLocaleString([], { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  const venue = comp.venue?.fullName || "";

  return `<div class="match ${state === "in" ? "live" : ""}">
    ${teamHtml(home, "home")}
    ${scoreHtml}
    ${teamHtml(away, "away")}
    <div class="meta">
      <span class="round">${esc(roundName(ev))} ${badge}</span>
      <span>${esc(venue)}${venue ? " · " : ""}${state === "pre" ? esc(when) : esc(new Date(ev.date).toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" }))}</span>
    </div>
    ${renderPbp(comp, teamsById, state === "in", ev.id)}
  </div>`;
}

function fill(id, list) {
  const section = document.getElementById(id + "-section");
  section.hidden = !list.length;
  document.getElementById(id).innerHTML = list.map(renderMatch).join("");
}

function setStatus(text, isError) {
  const line = document.getElementById("status-line");
  line.classList.toggle("error", !!isError);
  document.getElementById("status-text").textContent = text;
}

let timer = null;

async function refresh() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const events = data.events || [];

    const stateOf = ev => ev.competitions?.[0]?.status?.type?.state || "pre";
    const live = events.filter(ev => stateOf(ev) === "in")
      .sort((a, b) => new Date(a.date) - new Date(b.date));
    const upcoming = events.filter(ev => stateOf(ev) === "pre")
      .sort((a, b) => new Date(a.date) - new Date(b.date));
    const done = events.filter(ev => stateOf(ev) === "post")
      .sort((a, b) => new Date(b.date) - new Date(a.date));

    fill("live", live);
    fill("upcoming", upcoming);
    fill("results", done);

    if (!events.length) {
      document.getElementById("results-section").hidden = false;
      document.getElementById("results").innerHTML = `<div class="empty">No matches found in this date range.</div>`;
    }

    const now = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });
    setStatus(live.length
      ? `${live.length} match${live.length > 1 ? "es" : ""} live · updated ${now}`
      : `Updated ${now}`);

    clearTimeout(timer);
    timer = setTimeout(refresh, live.length ? REFRESH_LIVE_MS : REFRESH_IDLE_MS);
  } catch (err) {
    console.error(err);
    setStatus("Couldn't reach the scores feed — retrying in 60s");
    clearTimeout(timer);
    timer = setTimeout(refresh, 60_000);
  }
}

// keep user-opened timelines open across refreshes
document.addEventListener("toggle", e => {
  const id = e.target?.dataset?.pbp;
  if (!id) return;
  if (e.target.open) openPbps.add(id); else openPbps.delete(id);
}, true);

// pause polling when the tab is hidden, refresh immediately when it returns
document.addEventListener("visibilitychange", () => {
  if (document.hidden) clearTimeout(timer);
  else refresh();
});

refresh();
</script>
</body>
</html>
