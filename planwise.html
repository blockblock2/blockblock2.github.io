<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlanWise — plan trips together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE4; --card:#FBF8F1; --card-2:#F3ECDD;
    --ink:#23201B; --ink-soft:#726A5C; --ink-faint:#A79E8C;
    --ocean:#0F6E7E; --ocean-deep:#0A4C57; --gold:#CE912A;
    --coral:#D64F3C; --coral-deep:#B23D2C; --good:#4E8460;
    --line:#E1D7C4; --line-strong:#CFC2A9;
    --shadow:0 1px 0 rgba(35,32,27,.04), 0 10px 30px -18px rgba(35,32,27,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--ocean)}
  ::selection{background:#F3D9A2}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  .site-head{position:relative;overflow:hidden;background:radial-gradient(120% 90% at 80% -20%, rgba(15,110,126,.16), transparent 60%),linear-gradient(180deg,#EDE5D5 0%, var(--paper) 100%);border-bottom:1px solid var(--line)}
  .site-head .wrap{padding-top:22px;padding-bottom:20px;position:relative;z-index:2}
  .brandline{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand .kicker{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ocean-deep)}
  .brand h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(26px,5vw,40px);line-height:.96;margin:0;letter-spacing:-.02em}
  .brand h1 em{font-style:normal;color:var(--ocean)}
  .whoami{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink-soft)}
  .whoami .dot{width:30px;height:30px;border-radius:50%;background:var(--ocean);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;font-family:"Bricolage Grotesque"}
  .greca{height:12px;margin-top:16px}
  main{padding:30px 0 90px}
  .btn{font:inherit;font-weight:600;cursor:pointer;border-radius:11px;padding:11px 18px;border:1px solid transparent;transition:.15s transform,.15s background;display:inline-flex;align-items:center;gap:8px;line-height:1}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ocean);color:#fff} .btn-primary:hover{background:var(--ocean-deep)}
  .btn-coral{background:var(--coral);color:#fff} .btn-coral:hover{background:var(--coral-deep)}
  .btn-ghost{background:transparent;border-color:var(--line-strong);color:var(--ink)} .btn-ghost:hover{background:#00000008}
  .btn-sm{padding:8px 12px;border-radius:9px;font-size:14px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-link{background:none;border:none;color:var(--ocean);cursor:pointer;font:inherit;font-weight:600;padding:0}
  label.fld{display:block;margin-bottom:14px}
  label.fld span{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  input,select,textarea{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--ocean);outline-offset:1px;border-color:transparent}
  textarea{resize:vertical;min-height:60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .pad{padding:22px}
  .eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin:0 0 4px}
  .h-sec{font-family:"Bricolage Grotesque";font-weight:700;font-size:22px;letter-spacing:-.01em;margin:0}
  .muted{color:var(--ink-soft)} .faint{color:var(--ink-faint)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 10px 30px -10px #000a;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .err{color:var(--coral-deep);font-size:13.5px;min-height:18px;margin:2px 0 10px;font-weight:500}
  .divider{display:flex;align-items:center;gap:12px;color:var(--ink-faint);font-size:12px;margin:16px 0;text-transform:uppercase;letter-spacing:.1em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .auth-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:0;overflow:hidden}
  .auth-poster{background:radial-gradient(140% 120% at 20% 0%, rgba(206,145,42,.18), transparent 55%),linear-gradient(160deg, var(--ocean) 0%, var(--ocean-deep) 100%);color:#EAF4F2;padding:30px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;min-height:420px}
  .auth-poster h2{font-family:"Bricolage Grotesque";font-weight:800;font-size:30px;line-height:1.02;margin:14px 0 10px;letter-spacing:-.02em}
  .auth-poster p{color:#CFE6E4;max-width:34ch}
  .auth-poster .steps{list-style:none;padding:0;margin:18px 0 0;display:grid;gap:11px}
  .auth-poster .steps li{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;color:#DCEEEC}
  .auth-poster .steps b{display:grid;place-items:center;min-width:24px;height:24px;border-radius:7px;background:#ffffff1f;font-family:"Space Mono";font-size:12px;color:#fff}
  .auth-form{padding:30px}
  .tabs{display:inline-flex;background:var(--card-2);border-radius:11px;padding:4px;margin-bottom:20px}
  .tabs button{border:none;background:none;font:inherit;font-weight:600;color:var(--ink-soft);padding:8px 16px;border-radius:8px;cursor:pointer}
  .tabs button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px #0000000f}
  @media(max-width:680px){.auth-grid{grid-template-columns:1fr}.auth-poster{min-height:0}}
  .dash-top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .trip-card{cursor:pointer;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:0;overflow:hidden;transition:.15s;box-shadow:var(--shadow);display:block;width:100%;font:inherit;color:inherit}
  .trip-card:hover{transform:translateY(-2px);border-color:var(--line-strong)}
  .trip-card .band{height:8px;background:linear-gradient(90deg,var(--ocean),var(--gold))}
  .trip-card .fc-body{padding:16px 18px 18px}
  .trip-card h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:19px;margin:6px 0 3px;letter-spacing:-.01em}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 9px;border-radius:20px;background:var(--card-2);color:var(--ink-soft)}
  .pill.owner{background:#F5E7C6;color:#8A6410}
  .avatars{display:flex;margin-top:12px}
  .avatars .av{width:26px;height:26px;border-radius:50%;background:var(--ocean);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;border:2px solid var(--card);margin-left:-7px;font-family:"Bricolage Grotesque"}
  .avatars .av:first-child{margin-left:0}
  .avatars .av.more{background:var(--card-2);color:var(--ink-soft)}
  .empty{text-align:center;padding:46px 24px;border:1.5px dashed var(--line-strong);border-radius:16px;background:#fff8}
  .empty h3{font-family:"Bricolage Grotesque";font-weight:700;font-size:20px;margin:10px 0 4px}
  .join-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .join-row .fld{margin:0;flex:1;min-width:170px}
  .back{background:none;border:none;color:var(--ink-soft);font:inherit;font-weight:600;cursor:pointer;padding:6px 0;display:inline-flex;gap:7px;align-items:center;margin-bottom:12px}
  .back:hover{color:var(--ink)}
  .fam-hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:22px}
  .fam-hero h2{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(24px,4vw,34px);margin:6px 0 4px;letter-spacing:-.02em}
  .layout{display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:start}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}
  .code-token{border:1px dashed var(--line-strong);border-radius:13px;padding:14px;background:var(--card-2)}
  .code-token .code{font-family:"Space Mono";font-size:20px;font-weight:700;letter-spacing:.12em;color:var(--ocean-deep);word-break:break-all}
  .famblock{border-top:1px solid var(--line);padding:14px 0}
  .famblock:first-of-type{border-top:none;padding-top:2px}
  .famhead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .famname{font-family:"Bricolage Grotesque";font-weight:700;font-size:16px}
  .famcode{font-family:"Space Mono";font-size:12px;color:var(--ocean-deep);letter-spacing:.06em;background:var(--card-2);border:1px solid var(--line);border-radius:8px;padding:6px 9px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .famacts{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .tinybtn{font:inherit;font-weight:600;font-size:12px;border:1px solid var(--line-strong);background:#fff;border-radius:8px;padding:5px 9px;cursor:pointer;color:var(--ink-soft)}
  .tinybtn:hover{border-color:var(--ocean);color:var(--ocean)}
  .tinybtn.danger:hover{border-color:var(--coral);color:var(--coral)}
  .member{display:flex;align-items:center;gap:10px;padding:7px 0}
  .member .av{width:30px;height:30px;border-radius:50%;background:var(--ocean);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px;font-family:"Bricolage Grotesque";flex:none}
  .member .nm{font-weight:600;font-size:14px;line-height:1.15}
  .member .rm{margin-left:auto;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:16px;line-height:1;padding:2px 6px;border-radius:6px}
  .member .rm:hover{color:var(--coral);background:#0000000a}
  .addplan textarea{min-height:44px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
  .chip{border:1px solid var(--line-strong);background:#fff;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}
  .chip:hover{border-color:var(--ocean);color:var(--ocean)}
  .plan{display:flex;gap:14px;padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:12px;align-items:flex-start;box-shadow:var(--shadow)}
  .plan.top{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold), var(--shadow)}
  .vote{flex:none;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:8px 4px;min-width:56px;cursor:pointer;transition:.12s;color:var(--ink-soft)}
  .vote:hover{border-color:var(--coral)}
  .vote.on{background:#FBE7E2;border-color:var(--coral);color:var(--coral-deep)}
  .vote .up{font-size:18px;line-height:1}
  .vote .n{font-family:"Bricolage Grotesque";font-weight:800;font-size:20px;line-height:1}
  .vote .lbl{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .plan .body{flex:1;min-width:0}
  .plan .cat{font-family:"Space Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .plan h4{font-family:"Bricolage Grotesque";font-weight:700;font-size:18px;margin:3px 0 4px;letter-spacing:-.01em;word-wrap:break-word}
  .plan .note{font-size:14.5px;color:var(--ink-soft);margin:0 0 8px;word-wrap:break-word}
  .plan .meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-faint);flex-wrap:wrap}
  .plan .meta .who{font-weight:600;color:var(--ink-soft)}
  .plan .del{margin-left:auto;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:13px;font-weight:600;padding:4px 8px;border-radius:7px}
  .plan .del:hover{color:var(--coral);background:#0000000a}
  .plan .edit{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:13px;font-weight:600;padding:4px 8px;border-radius:7px}
  .plan .edit:hover{color:var(--ocean);background:#0000000a}
  .voters{font-size:12px;color:var(--ink-faint)}
  .crown{color:var(--gold)}
  .sort-note{font-size:12.5px;color:var(--ink-faint);margin:0 0 14px}
  .planimg{display:block;width:100%;max-height:190px;object-fit:cover;border-radius:11px;border:1px solid var(--line);margin:2px 0 10px;background:var(--card-2)}
  .planlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ocean);text-decoration:none;margin:0 0 9px;max-width:100%;word-break:break-all}
  .planlink:hover{text-decoration:underline}
  .imgfield{display:flex;gap:8px;align-items:stretch}
  .imgfield input{flex:1;min-width:0}
  .thumbwrap{position:relative;display:inline-block;margin-top:10px}
  .thumbwrap img{max-height:120px;max-width:100%;border-radius:10px;border:1px solid var(--line-strong);display:block}
  .thumbwrap button{position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:15px;line-height:1;display:grid;place-items:center}
  .setup code{background:var(--card-2);padding:2px 6px;border-radius:6px;font-family:"Space Mono";font-size:13px}
  .setup ol{padding-left:20px;line-height:1.7} .setup li{margin-bottom:6px}
  .hide{display:none!important}
</style>
</head>
<body>
<div class="site-head">
  <div class="wrap">
    <div class="brandline">
      <div class="brand">
        <div>
          <div class="kicker">Plan trips together</div>
          <h1><em>Plan</em>Wise</h1>
        </div>
      </div>
      <div id="whoami"></div>
    </div>
    <svg class="greca" viewBox="0 0 480 12" preserveAspectRatio="none" aria-hidden="true">
      <defs><pattern id="step" width="48" height="12" patternUnits="userSpaceOnUse">
        <path d="M0 11 h8 v-3 h6 v-3 h6 v-3 h8 v3 h6 v3 h6 v3 h8" fill="none" stroke="#CE912A" stroke-width="1.4" opacity=".55"/>
      </pattern></defs>
      <rect width="480" height="12" fill="url(#step)"/>
    </svg>
  </div>
</div>
<main><div class="wrap" id="app"></div></main>
<div class="toast" id="toast"></div>

<script type="module">
/* ============================================================
   Firebase (modular v10 CDN). No build step needed.
   ---> PASTE YOUR OWN CONFIG in the block below. <---
   Firebase Console > Project settings > Your apps. Keep databaseURL.
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb7YEiFH8W2hWo8JJ2hUOgy0aaJx_OJtQ",
  authDomain: "planwise-73ada.firebaseapp.com",
  databaseURL: "https://planwise-73ada-default-rtdb.firebaseio.com",
  projectId: "planwise-73ada",
  storageBucket: "planwise-73ada.firebasestorage.app",
  messagingSenderId: "962739841833",
  appId: "1:962739841833:web:686f6fcc6a0a3283b7a538"
};

const NEEDS_SETUP = /PASTE_/.test(JSON.stringify(firebaseConfig));
let db = null;
if(!NEEDS_SETUP){ db = getDatabase(initializeApp(firebaseConfig)); }

/* ============ helpers ============ */
const $ = s => document.querySelector(s);
const app = $("#app");
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return String(name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?"; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function genCode(){ const a="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let c=""; for(let i=0;i<6;i++)c+=a[Math.floor(Math.random()*a.length)]; return "TRIP-"+c; }
let toastT; function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
async function sha256(str){
  try{ const b=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
  catch(e){ let h=0; for(let i=0;i<str.length;i++){h=(h<<5)-h+str.charCodeAt(i)|0;} return "x"+(h>>>0).toString(16); }
}
async function copyText(text){ try{ await navigator.clipboard.writeText(text); toast("Copied: "+text); }catch(_){ toast(text); } }
function normalizeLink(v){ v=(v||"").trim(); if(!v) return ""; if(!/^https?:\/\//i.test(v)) v="https://"+v; return v; }
function hostOf(u){ try{ return new URL(u).hostname.replace(/^www\./,""); }catch(e){ return u; } }
function compressImage(file, maxDim=800, quality=0.6){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg", quality)); };
      img.onerror=reject; img.src=r.result; };
    r.onerror=reject; r.readAsDataURL(file);
  });
}
let uploadData = null;          // compressed data URL when a file is chosen
const mediaCache = {};          // planId -> image data URL (lazy loaded)
async function handleImageFile(file){
  if(!file) return;
  if(!file.type || !file.type.startsWith("image/")){ toast("Choose an image file"); return; }
  toast("Processing image…");
  try{ uploadData = await compressImage(file); const u=$("#p-img"); if(u) u.value=""; refreshImgPreview(); }
  catch(e){ toast("Couldn't process that image"); }
}
function refreshImgPreview(){
  const box=$("#img-preview"); if(!box) return;
  const src = uploadData || (($("#p-img")?.value||"").trim());
  if(!src){ box.innerHTML=""; return; }
  box.innerHTML = `<div class="thumbwrap"><img alt="preview"><button data-act="clear-img" title="Remove">×</button></div>`;
  const img=box.querySelector("img");
  img.onerror=()=>{ if(!uploadData){ box.innerHTML=""; } };
  img.src=src;
}
async function handlePlanImageFile(file){
  if(!file) return;
  if(!file.type || !file.type.startsWith("image/")){ toast("Choose an image file"); return; }
  toast("Processing image…");
  try{ uploadPlanData = await compressImage(file); const u=$("#ep-img"); if(u) u.value=""; refreshPlanImgPreview(); }
  catch(e){ toast("Couldn't process that image"); }
}
function refreshPlanImgPreview(){
  const box=$("#plan-img-preview"); if(!box) return;
  const src = uploadPlanData || (($("#ep-img")?.value||"").trim());
  if(!src){ box.innerHTML=""; return; }
  box.innerHTML = `<div class="thumbwrap"><img alt="preview" style="max-width:100%"><button data-act="clear-plan-img" title="Remove">×</button></div>`;
  const img=box.querySelector("img");
  img.onerror=()=>{ if(!uploadPlanData){ box.innerHTML=""; } };
  img.src=src;
}

/* ============ Firebase data layer ============ */
const P = p => ref(db, p);
async function getVal(p){ const s = await get(P(p)); return s.exists()? s.val() : null; }
const setVal    = (p,v)=> set(P(p), v);
const updateVal = (p,o)=> update(P(p), o);
const removeVal = (p)  => remove(P(p));

/* ============ session ============ */
const SKEY = "planwise_session";
function saveSession(u){ try{ localStorage.setItem(SKEY, JSON.stringify({username:u.username})); }catch(e){} }
function loadSessionLS(){ try{ return JSON.parse(localStorage.getItem(SKEY)); }catch(e){ return null; } }

const state = { user:null, view:"auth", authTab:"signup", tripId:null };
let activeListeners = [];
let aiSuggestionsEnabled = localStorage.getItem("planwise_ai_suggestions") !== "false"; // default enabled
let aiAutoAdd = localStorage.getItem("planwise_ai_auto_add") === "true"; // default confirm
function clearListeners(){ activeListeners.forEach(u=>{ try{u();}catch(e){} }); activeListeners=[]; }

const userCache = {};
async function ensureNames(lowers){
  await Promise.all([...new Set(lowers)].filter(l=>!userCache[l]).map(async l=>{
    const u = await getVal("users/"+l); userCache[l] = u ? u.displayName : l;
  }));
}
const nameOf = l => userCache[l] || l;
const me = () => state.user.username.toLowerCase();

/* ============ auth ============ */
async function doSignup(name, pass){
  name = name.trim();
  if(!name||!pass) return "Fill in every field to continue.";
  if(pass.length<4) return "Give your password at least 4 characters.";
  const lower = name.toLowerCase();
  if(await getVal("users/"+lower)) return "That name is taken — try another.";
  const user = { username:lower, displayName:name, pass:await sha256(pass), createdAt:Date.now() };
  await setVal("users/"+lower, user);
  saveSession(user); state.user=user; return null;
}
async function doLogin(name, pass){
  const lower = name.trim().toLowerCase();
  const u = await getVal("users/"+lower);
  if(!u || u.pass !== await sha256(pass)) return "Username or password doesn't match.";
  saveSession(u); state.user=u; return null;
}

/* ============ trip + family ops ============ */
async function createTrip(tripName, dest, famName, numDays){
  const m = me();
  const tripId = uid(), tripCode = genCode();
  const famId = uid(), famCode = genCode();
  const days = {};
  for(let i=1; i<=(parseInt(numDays)||3); i++) days[i] = true;
  const trip = { id:tripId, name:tripName.trim(), destination:(dest.trim()||""),
    owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:tripCode, families:{[famId]:true}, admins:{}, days };
  const fam = { id:famId, tripId, name:(famName.trim()||(state.user.displayName+"'s family")),
    owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:famCode, members:{[m]:true} };
  await setVal("trips/"+tripId, trip);
  await setVal("families/"+famId, fam);
  await setVal("tripcodes/"+tripCode, tripId);
  await setVal("famcodes/"+famCode, famId);
  return tripId;
}
async function joinTrip(code, famName){
  code = code.trim().toUpperCase();
  if(!code) return "Enter a trip code.";
  const tripId = await getVal("tripcodes/"+code);
  if(!tripId) return "That trip code isn't valid.";
  const trip = await getVal("trips/"+tripId);
  if(!trip) return "That trip no longer exists.";
  const m = me();
  const famId = uid(), famCode = genCode();
  const fam = { id:famId, tripId, name:(famName.trim()||(state.user.displayName+"'s family")),
    owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:famCode, members:{[m]:true} };
  await setVal("families/"+famId, fam);
  await setVal("famcodes/"+famCode, famId);
  await updateVal("trips/"+tripId+"/families", {[famId]:true});
  return { ok:tripId };
}
async function joinFamily(code){
  code = code.trim().toUpperCase();
  if(!code) return "Enter a family code.";
  const famId = await getVal("famcodes/"+code);
  if(!famId) return "That family code isn't valid.";
  const fam = await getVal("families/"+famId);
  if(!fam) return "That family no longer exists.";
  const m = me();
  if(fam.members && fam.members[m]) return "You're already in this family.";
  await updateVal("families/"+famId+"/members", {[m]:true});
  return { ok:fam.tripId };
}
async function updateTrip(tripId, {name, dest, numDays}){
  const trip = await getVal("trips/"+tripId);
  if(!trip) return;
  trip.name = name.trim() || trip.name;
  trip.destination = dest.trim() || trip.destination;
  
  // Handle days: if changed, rebuild days object
  const newDayCount = parseInt(numDays)||3;
  const currentDayCount = Object.keys(trip.days||{}).length;
  if(newDayCount !== currentDayCount){
    trip.days = {};
    for(let i=1; i<=newDayCount; i++) trip.days[i] = true;
  }
  
  await updateVal("trips/"+tripId, {name:trip.name, destination:trip.destination, days:trip.days});
}
async function regenTripCode(trip){
  await removeVal("tripcodes/"+trip.code);
  const code = genCode();
  await updateVal("trips/"+trip.id, {code});
  await setVal("tripcodes/"+code, trip.id);
}
async function regenFamCode(fam){
  await removeVal("famcodes/"+fam.code);
  const code = genCode();
  await updateVal("families/"+fam.id, {code});
  await setVal("famcodes/"+code, fam.id);
}
async function removeFamily(tripId, fam){
  await removeVal("famcodes/"+fam.code);
  await removeVal("families/"+fam.id);
  await removeVal("trips/"+tripId+"/families/"+fam.id);
}
const removeMember = (famId,m)=> removeVal("families/"+famId+"/members/"+m);
async function setAdmin(tripId, username, isAdmin){
  if(isAdmin) await setVal("trips/"+tripId+"/admins/"+username, true);
  else await removeVal("trips/"+tripId+"/admins/"+username);
}
const isAdmin = () => curTrip && (curTrip.admins && curTrip.admins[me()] || false);
async function addPlan(tripId, {title,cat,note,link,img,day}){
  const m = me(), id = uid();
  const plan = { title:title.trim(), cat, note:note.trim(),
    addedBy:m, addedByName:state.user.displayName, createdAt:Date.now(), votes:{[m]:true}, day:(day||"TBD") };
  if(link) plan.link = link;
  if(img){
    if(img.upload){ await setVal("planmedia/"+tripId+"/"+id, img.data); mediaCache[id]=img.data; plan.img="@media"; }
    else { plan.img = img.url; }
  }
  await setVal("plans/"+tripId+"/"+id, plan);
}
async function updatePlan(tripId, planId, {title,cat,note,link,img,day}){
  const updates = { title:title.trim(), cat, note:note.trim(), day:(day||"TBD") };
  if(link) updates.link = link;
  if(img){
    if(img.upload){ await setVal("planmedia/"+tripId+"/"+planId, img.data); mediaCache[planId]=img.data; updates.img="@media"; }
    else if(img.url) { updates.img = img.url; }
  } else if(img===false) { 
    await removeVal("planmedia/"+tripId+"/"+planId); 
    delete mediaCache[planId]; 
    updates.img = null; 
  }
  await updateVal("plans/"+tripId+"/"+planId, updates);
}
async function toggleVote(tripId, planId, voted){
  const p = "plans/"+tripId+"/"+planId+"/votes/"+me();
  if(voted) await removeVal(p); else await setVal(p, true);
}

async function getAISuggestedPlan(tripName, destination, existingPlans){
  const planList = existingPlans.slice(0,5).map(p=>`• ${p.title} (${p.cat})`).join("\n") || "No plans yet";
  
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 150,
        messages: [{
          role: "user",
          content: `For a trip to ${destination}, with these existing plans:\n${planList}\n\nSuggest ONE creative activity idea. Format ONLY as JSON: {"title":"Activity name","category":"Category","note":"Brief description"}. Categories: ${CATS.join(", ")}`
        }]
      })
    });
    
    if(!response.ok) return null;
    const data = await response.json();
    const text = data.content[0]?.text||"";
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if(jsonMatch) return JSON.parse(jsonMatch[0]);
  } catch(e) {
    console.log("Plan suggestion failed:", e);
  }
  return null;
}
function travelersOfTrip(tId){ const s=new Set(); famsOfTrip(tId).forEach(f=>Object.keys(f.members||{}).forEach(x=>s.add(x))); return [...s]; }

async function paintTrips(){
  if(!tripsLoaded||!famsLoaded) return;
  const wrap = $("#trip-grid-wrap"); if(!wrap) return;
  const m = me();
  const myTripIds = new Set(Object.values(allFams).filter(f=>f && f.members && f.members[m]).map(f=>f.tripId));
  const trips = Object.values(allTrips).filter(t=>t && myTripIds.has(t.id)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(!trips.length){
    wrap.innerHTML = `<div class="empty"><div style="font-size:34px">🗺️</div><h3>No trips yet</h3>
      <p class="muted" style="max-width:42ch;margin:0 auto 4px">Start a trip to gather families and plans — or join one with a code.</p></div>`;
    return;
  }
  await ensureNames(trips.flatMap(t=>travelersOfTrip(t.id)));
  wrap.innerHTML = `<div class="trip-grid">${trips.map(t=>{
    const owner = t.owner===m;
    const fams = famsOfTrip(t.id), trav = travelersOfTrip(t.id);
    const shown = trav.slice(0,4), extra = trav.length-shown.length;
    const avs = shown.map(x=>`<span class="av">${esc(initials(nameOf(x)))}</span>`).join("")+(extra>0?`<span class="av more">+${extra}</span>`:"");
    return `<button class="trip-card" data-open="${t.id}"><div class="band"></div><div class="fc-body">
      ${owner?`<span class="pill owner">★ You own this</span>`:`<span class="pill">Traveler</span>`}

  }).join("")}</div>`;
}

function paintPlans(){
  const list = $("#plan-list"); if(!list) return;
  const prompt = $("#plan-prompt"); if(prompt) prompt.textContent = `What should we do in ${curTrip ? esc(curTrip.destination) : "this place"}?`;
  const m = me(), owner = curTrip.owner===m;
  paintDaySelector();
  
  if(!curPlans.length){
    list.innerHTML = `<div class="empty"><div style="font-size:30px">🌮</div><h3>No plans yet</h3>
      <p class="muted" style="max-width:38ch;margin:0 auto">Add the first idea — a restaurant, a barrio, a day trip. Then everyone votes.</p></div>`;
    return;
  }
  
  const cnt = $("#plan-count"); if(cnt) cnt.textContent = `${curPlans.length} plan${curPlans.length===1?'':'s'}`;
  
  // Group plans by day
  const byDay = {TBD:[]};
  const days = Object.keys(curTrip.days||{}).sort((a,b)=>parseInt(a)-parseInt(b));
  days.forEach(d=>{ byDay["Day "+d]=[]; });
  
  curPlans.forEach(p=>{ const day = p.day||"TBD"; if(!byDay[day]) byDay[day]=[]; byDay[day].push(p); });
  
  // Sort each day's plans by votes
  Object.keys(byDay).forEach(day=>{ 
    byDay[day].sort((a,b)=>(Object.keys(b.votes||{}).length)-(Object.keys(a.votes||{}).length) || (a.createdAt||0)-(b.createdAt||0));
  });
  
  // Get top vote count across all plans
  const allVotes = curPlans.map(p=>Object.keys(p.votes||{}).length);
  const maxVotes = allVotes.length ? Math.max(...allVotes) : 0;
  
  // Render: TBD first, then days in order
  const dayOrder = ["TBD", ...days.map(d=>"Day "+d)];
  let html = "";
  
  dayOrder.forEach(dayLabel=>{
    const plans = byDay[dayLabel]||[];
    if(!plans.length) return;
    
    html += `<div style="margin-bottom:18px">
      <h4 style="font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;margin:0 0 10px;color:var(--ocean)">${dayLabel}</h4>`;
    
    plans.forEach(p=>{
      const votes = Object.keys(p.votes||{}), n = votes.length, voted = votes.includes(m);
      const canDel = owner || isAdmin() || p.addedBy===m;
      const isTop = n>0 && n===maxVotes;
      let imgHtml = "";
      if(p.img==="@media"){ imgHtml = `<img class="planimg" data-media="${p.id}" alt="">`; }
      else if(p.img){ imgHtml = `<img class="planimg" src="${esc(p.img)}" alt="" onerror="this.style.display='none'">`; }
      const linkHtml = p.link ? `<a class="planlink" href="${esc(p.link)}" target="_blank" rel="noopener noreferrer">🔗 ${esc(hostOf(p.link))}</a>` : "";
      
      html += `<div class="plan ${isTop?'top':''}">
        <button class="vote ${voted?'on':''}" data-vote="${p.id}" data-voted="${voted?1:0}" aria-pressed="${voted}">
          <span class="up">▲</span><span class="n">${n}</span><span class="lbl">${n===1?'vote':'votes'}</span></button>
        <div class="body">
          <div class="cat">${isTop?'<span class="crown">★ leading · </span>':''}${esc(p.cat||'Idea')}</div>
          <h4>${esc(p.title)}</h4>
          ${p.note?`<p class="note">${esc(p.note)}</p>`:''}
          ${imgHtml}
          ${linkHtml}
          <div class="meta"><span class="who">${esc(p.addedByName||p.addedBy)}</span> added this
            ${n>0?`· <span class="voters">${n} on board</span>`:''}
            ${canDel?`<button class="edit" data-editplan="${p.id}" style="margin-left:auto;margin-right:6px">Edit</button><button class="del" data-delplan="${p.id}">Remove</button>`:''}</div>
        </div></div>`;
    });
    html += `</div>`;
  });
  
  list.innerHTML = html;
  // lazily fill uploaded images without bloating the live plans feed
  list.querySelectorAll("[data-media]").forEach(async imgEl=>{
    const pid = imgEl.dataset.media;
    if(mediaCache[pid]){ imgEl.src = mediaCache[pid]; return; }
    const d = await getVal("planmedia/"+state.tripId+"/"+pid);
    if(d){ mediaCache[pid]=d; imgEl.src=d; } else { imgEl.style.display="none"; }
  });
}
function enterTrip(id){
  clearListeners(); state.view="trip"; state.tripId=id;
  curTrip=null; curFams=[]; curPlans=[]; uploadData=null;
  app.innerHTML = `<p class="muted">Loading…</p>`;
  const m = me(); let shellDone=false;

  function tryPaint(){
    if(!curTrip) return;
    const owner = curTrip.owner===m;
    if(!shellDone){ tripShell(curTrip, owner); shellDone=true; }
    paintHeroCount(); paintEditButton(); paintTripCode(owner); if(owner){ paintAdmins(); paintMakeAdmin(); } paintFamilies(owner); paintAISuggestions(); paintPlans();
  }
  const onErr = ()=>{ app.innerHTML=`<p class="err">Couldn't reach the database. Check your Firebase config and rules.</p>`; };

  activeListeners.push(onValue(P("trips/"+id), s=>{
    const t = s.val();
    if(!t){ toast("This trip no longer exists."); goDashboard(); return; }
    t.id=id; curTrip=t; tryPaint();
  }, onErr));

  activeListeners.push(onValue(P("families"), async s=>{
    const all = s.val()||{};
    curFams = Object.values(all).filter(f=>f && f.tripId===id);
    const iAmIn = curFams.some(f=>f.members && f.members[m]);
    if(curFams.length && !iAmIn){ toast("You're no longer on this trip."); goDashboard(); return; }
    await ensureNames(curFams.flatMap(f=>[f.owner, ...Object.keys(f.members||{})]));
    tryPaint();
  }, onErr));

  activeListeners.push(onValue(P("plans/"+id), s=>{
    const v = s.val()||{};
    curPlans = Object.entries(v).map(([pid,p])=>({id:pid,...p}));
    if(curTrip) paintPlans();
  }));
}

      const daysel = $("#ep-day");

        daysel.innerHTML = `<option value="TBD">TBD (no date yet)</option>${days.map(d=>`<option value="Day ${d}">Day ${d}</option>`).join("")}`;
        daysel.value = plan.day||"TBD";
      }

      setErr("plan-edit-err",""); 
      if(m) m.classList.remove("hide");

  const delp = e.target.closest("[data-delplan]");
  if(delp){ if(confirm("Remove this plan for everyone?")){ await deletePlan(state.tripId, delp.dataset.delplan); toast("Plan removed"); } return; }

  const copyfam = e.target.closest("[data-copyfam]");

  const regenfam = e.target.closest("[data-regenfam]");

  const rmfam = e.target.closest("[data-rmfam]");

  const rmm = e.target.closest("[data-rmm]");

  const unadmin = e.target.closest("[data-unadmin]");

    if(!title.trim()){ setErr("plan-edit-err","Give the plan a name."); return; }
    const urlImg = val("ep-img").trim();
    const img = uploadPlanData ? {upload:true, data:uploadPlanData} : (urlImg ? {upload:false, url:urlImg} : null);
    await updatePlan(state.tripId, editingPlanId, {title, cat:val("ep-cat"), note:val("ep-note"), link:normalizeLink(val("ep-link")), img, day:val("ep-day")});
    uploadPlanData=null; const m=$("#edit-plan-modal"); if(m) m.classList.add("hide"); editingPlanId=null;
    toast("Plan updated"); return; }
  if(a==="pick-plan-img"){ $("#ep-file")?.click(); return; }
});
document.addEventListener("click", (e)=>{
  if(e.target.id==="edit-trip-modal"){ $("#edit-trip-modal").classList.add("hide"); }
  if(e.target.id==="edit-plan-modal"){ $("#edit-plan-modal").classList.add("hide"); editingPlanId=null; uploadPlanData=null; }
  if(e.target.id==="ai-settings-modal"){ $("#ai-settings-modal").classList.add("hide"); }
});
document.addEventListener("change",(e)=>{ 
  if(e.target && e.target.id==="p-file"){ handleImageFile(e.target.files && e.target.files[0]); }
  if(e.target && e.target.id==="ep-file"){ handlePlanImageFile(e.target.files && e.target.files[0]); }
});
document.addEventListener("input",(e)=>{ 
  if(e.target && e.target.id==="p-img" && !uploadData){ refreshImgPreview(); }
  if(e.target && e.target.id==="ep-img" && !uploadPlanData){ refreshPlanImgPreview(); }
});
document.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;
  const id = e.target && e.target.id;
  if(id==="f-pass"){ $(`[data-act="${state.authTab}"]`)?.click(); }
  else if(id==="join-fam"){ $('[data-act="join-fam"]')?.click(); }
});

/* ============ boot ============ */
(async function(){
  renderWhoami();
  if(NEEDS_SETUP){ renderSetup(); return; }
  const s = loadSessionLS();
  if(s && s.username){
    const u = await getVal("users/"+s.username.toLowerCase());
    if(u){ state.user=u; goDashboard(); return; }
  }
  goAuth();
})();
</script>
</body>
