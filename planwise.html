<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanWise • Collaborative Trip Planning</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..128,400;12..128,600&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --paper: #F4EFE4;
      --ocean: #0F6E7E;
      --gold: #CE912A;
      --coral: #D64F3C;
      --ink: #23201B;
      --card-1: #FFFBF7;
      --card-2: #F9F4ED;
    }
    html { font-family: "Hanken Grotesk", sans-serif; color: var(--ink); background: var(--paper); }
    body { overflow-x: hidden; }
    #app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1, h2, h3 { font-family: "Bricolage Grotesque", sans-serif; font-weight: 600; }
    h1 { font-size: 32px; }
    h2 { font-size: 28px; }
    h3 { font-size: 22px; }
    .h-sec { font-size: 20px; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ocean); margin-bottom: 4px; }
    .faint { color: #8B7355; font-weight: 400; }
    .muted { color: #9A8B7E; }
    .err { background: #FFE8E6; border: 1px solid var(--coral); border-radius: 6px; padding: 10px; color: var(--coral); font-size: 13px; margin-bottom: 12px; display: none; }
    .err:not(:empty) { display: block; }
    button { font-family: inherit; cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: var(--ocean); color: white; }
    .btn-primary:hover { background: #0A4F5F; }
    .btn-ghost { background: transparent; color: var(--ink); border: 1px solid #D4C4B0; }
    .btn-ghost:hover { background: #FAF7F1; }
    .btn-coral { background: var(--coral); color: white; }
    .btn-coral:hover { background: #C23C2B; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: var(--card-1); border-radius: 11px; border: 1px solid #E8DED3; }
    .pad { padding: 18px; }
    .fld { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .fld span { font-weight: 500; font-size: 13px; }
    .fld input, .fld textarea, .fld select { border: 1px solid #D4C4B0; border-radius: 6px; padding: 8px; font-family: inherit; font-size: 14px; }
    .fld textarea { resize: vertical; min-height: 60px; }
    .fld input:focus, .fld textarea:focus, .fld select:focus { outline: none; border-color: var(--ocean); box-shadow: 0 0 0 3px rgba(15,110,126,0.1); }
    .divider { text-align: center; margin: 16px 0; color: #9A8B7E; font-size: 12px; display: flex; align-items: center; gap: 10px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #D4C4B0; }
    .back { display: block; margin-bottom: 14px; padding: 8px 0; background: none; color: var(--ocean); border: none; font-weight: 500; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    .fam-hero { background: linear-gradient(135deg, var(--ocean), #0A4F5F); color: white; padding: 30px; border-radius: 11px; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: flex-start; }
    .fam-hero h2 { color: white; margin: 8px 0 4px; }
    .fam-hero .muted { color: rgba(255,255,255,0.8); }
    .layout { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    .addplan { background: var(--card-2); }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 6px 12px; background: #E8DED3; border: 1px solid #D4C4B0; border-radius: 999px; font-size: 13px; cursor: pointer; }
    .chip:hover { background: #D4C4B0; }
    .imgfield { display: flex; gap: 8px; }
    .imgfield input { flex: 1; }
    .sort-note { font-size: 13px; color: #9A8B7E; margin-bottom: 12px; }
    .plan-item { background: var(--card-1); border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #E8DED3; position: relative; }
    .plan-item.voted { border-left-color: var(--gold); background: #FFFEF5; }
    .plan-item.top { border-left-color: var(--gold); background: #FFFEF5; box-shadow: 0 2px 8px rgba(206,145,42,0.15); }
    .plan-day-header { font-weight: 600; font-size: 13px; margin-top: 16px; margin-bottom: 8px; color: var(--ocean); }
    .plan-day-header:first-child { margin-top: 0; }
    .plan-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .plan-title { font-weight: 600; font-size: 14px; }
    .plan-cat { font-size: 12px; background: #E8DED3; padding: 2px 6px; border-radius: 3px; color: #8B7355; }
    .plan-note { font-size: 13px; color: #9A8B7E; margin-top: 6px; line-height: 1.4; }
    .plan-votes { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .vote-btn { width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; background: #E8DED3; border: 1px solid #D4C4B0; border-radius: 4px; font-size: 16px; }
    .vote-btn:hover { background: #D4C4B0; }
    .vote-btn.voted { background: var(--gold); color: white; border-color: var(--gold); }
    .plan-actions { display: flex; gap: 6px; margin-top: 8px; }
    .plan-actions .btn-sm { padding: 4px 8px; font-size: 12px; }
    .pill { display: inline-block; padding: 4px 8px; background: #E8DED3; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .pill.owner { background: var(--gold); color: white; }
    .trip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .trip-card { text-align: left; padding: 0; border: 1px solid #E8DED3; border-radius: 8px; overflow: hidden; cursor: pointer; background: var(--card-1); }
    .trip-card:hover { border-color: var(--ocean); box-shadow: 0 4px 12px rgba(15,110,126,0.1); }
    .trip-card .band { height: 4px; background: linear-gradient(90deg, var(--ocean), var(--coral)); }
    .trip-card .fc-body { padding: 12px; }
    .trip-card h3 { font-size: 18px; margin: 6px 0 4px; }
    .avatars { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .av { width: 24px; height: 24px; background: var(--ocean); color: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
    .av.more { background: #9A8B7E; }
    .empty { text-align: center; padding: 40px 20px; }
    .empty > div:first-child { font-size: 48px; margin-bottom: 16px; }
    .dash-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 16px; }
    .dash-top > div:last-child { display: flex; gap: 8px; }
    @media (max-width: 768px) { .dash-top { flex-direction: column; align-items: flex-start; } }
    .hide { display: none !important; }
    aside .card { margin-bottom: 14px; }
    .code-token { background: #F9F4ED; padding: 10px; border-radius: 6px; border: 1px dashed #D4C4B0; }
    .code { font-family: "Space Mono", monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; word-break: break-all; }
    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #E8DED3; font-size: 13px; }
    .member-item:last-child { border-bottom: none; }
    .family-item { background: var(--card-2); padding: 10px; border-radius: 6px; margin-bottom: 8px; }
    .family-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .family-item-header .faint { font-size: 12px; }
    .family-codes { display: flex; flex-direction: column; gap: 6px; font-size: 12px; margin-top: 6px; }
    .code-label { color: #9A8B7E; }
    .join-row { display: flex; gap: 8px; align-items: flex-end; }
    .join-row .fld { margin-bottom: 0; flex: 1; }
    .join-row .btn { align-self: flex-end; margin-bottom: 0; }
    @media (max-width: 768px) {
      .join-row { flex-direction: column; }
      .join-row .btn { width: 100%; align-self: auto; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref as P, set as setVal, onValue, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDb7YEiFH8W2hWo8JJ2hUOgy0aaJx_OJtQ",
  authDomain: "planwise-73ada.firebaseapp.com",
  databaseURL: "https://planwise-73ada-default-rtdb.firebaseio.com",
  projectId: "planwise-73ada",
  storageBucket: "planwise-73ada.firebasestorage.app",
  messagingSenderId: "962739841833",
  appId: "1:962739841833:web:686f6fcc6a0a3283b7a538"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const app$ = document.getElementById("app");
const CATS  = ["Eat & drink","Sights","Neighborhoods","Day trips","Nightlife","Where to stay"];
const IDEAS = ["Museum or gallery","Local market","Walking tour","Restaurant recommendation","Sunset viewpoint","Coffee or drinks"];
const state = { user:null, view:"auth", authTab:"signup", tripId:null };
let activeListeners = [];
let allTrips = {}, allFams = {}, allUsers = {};
let tripsLoaded = false, famsLoaded = false;
let curTrip=null, curFams=[], curPlans=[];
let editingPlanId = null, uploadPlanData = null;
let shellDone = false;

const $ = (s) => app$.querySelector(s);
const $$ = (s) => [...app$.querySelectorAll(s)];
const uid = () => Math.random().toString(36).slice(2,11);
const genCode = () => "TRIP-"+Math.random().toString(36).slice(2,8).toUpperCase();
const esc = (t) => { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; };
const me = () => (state.user?.name||"").toLowerCase();
const val = (id) => $(`.#${id}`)?.value||"";
const setErr = (id, msg) => { const el = $("#" + id); if(el) { el.textContent = msg; el.style.display = msg ? "block" : "none"; }};
const toast = (msg) => console.log("[toast]", msg);
const initials = (n) => n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const nameOf = (userLower) => allUsers[userLower]?.displayName || userLower;
const me$ = () => state.user ? me() : null;
const isAdmin = () => curTrip && (curTrip.admins && curTrip.admins[me()] || false);

function clearListeners(){ activeListeners.forEach(x=>x()); activeListeners=[]; }
function auth(name, pass){ const u = allUsers[name.toLowerCase()]; return u && u.pass === sha256(pass) ? u : null; }
function sha256(str) { const s = []; for(let i=0;i<256;i++) s[i]=i; let j=0; for(let i=0;i<256;i++) { j=(j+s[i]+str.charCodeAt(i%str.length))%256; [s[i],s[j]]=[s[j],s[i]]; } let k=0,l=0,h=""; for(let i=0;i<str.length;i++) { k=(k+1)%256; l=(l+s[k])%256; [s[k],s[l]]=[s[l],s[k]]; h+=String.fromCharCode(str.charCodeAt(i)^s[(s[k]+s[l])%256]); } return btoa(h); }
async function ensureNames(users){ const needed = users.filter(u=>!allUsers[u]); if(!needed.length) return; const snap = await getVal(P(db,"users")); const all = snap.val()||{}; needed.forEach(u=>{ if(all[u]) allUsers[u]=all[u]; }); }
const getVal = (ref) => new Promise((res,rej) => onValue(ref, s=>{ res(s); s.ref.off("value"); }, rej));
const famsOfTrip = (id) => Object.values(allFams).filter(f=>f && f.tripId===id);
const travelersOfTrip = (tId) => { const s=new Set(); famsOfTrip(tId).forEach(f=>Object.keys(f.members||{}).forEach(x=>s.add(x))); return [...s]; };

async function createTrip(tripName, dest, famName){
  const m = me();
  const tripId = uid(), tripCode = genCode();
  const famId = uid(), famCode = genCode();
  const days = {};
  for(let i=1; i<=parseInt($("#nt-days").value||3); i++) days[i]=true;
  const trip = { id:tripId, name:tripName.trim(), destination:(dest.trim()||""), owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:tripCode, families:{[famId]:true}, admins:{}, days };
  const fam = { id:famId, tripId, name:(famName.trim()||(state.user.displayName+"'s family")), owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:famCode, members:{[m]:true} };
  await setVal(P(db,"trips/"+tripId), trip);
  await setVal(P(db,"families/"+famId), fam);
  await setVal(P(db,"tripcodes/"+tripCode), tripId);
  await setVal(P(db,"famcodes/"+famCode), famId);
  return tripId;
}

async function updateTrip(tripId, {name, dest, numDays}){
  const days = {};
  for(let i=1; i<=numDays; i++) days[i]=true;
  await update(P(db,"trips/"+tripId), {name, destination:dest, days});
}

async function addPlan(tripId, {title,cat,note,link,img,day}){
  const m = me();
  const planId = uid();
  const plan = {title,cat,note:note||"",link:link||"",addedBy:m,addedByName:state.user.displayName,createdAt:Date.now(),votes:{},day:day||"TBD"};
  await setVal(P(db,"plans/"+tripId+"/"+planId), plan);
  if(img && img.startsWith("data:")) await setVal(P(db,"planmedia/"+tripId+"/"+planId), img);
}

async function updatePlan(tripId, planId, {title,cat,note,link,img,day}){
  const upd = {title,cat,note:note||"",link:link||"",day:day||"TBD"};
  await update(P(db,"plans/"+tripId+"/"+planId), upd);
  if(img && img.startsWith("data:")) await setVal(P(db,"planmedia/"+tripId+"/"+planId), img);
  else if(img===null) await remove(P(db,"planmedia/"+tripId+"/"+planId));
}

async function setAdmin(tripId, username, isAdmin){
  const path = "trips/"+tripId+"/admins/"+username.toLowerCase();
  if(isAdmin) await setVal(P(db,path), true);
  else await remove(P(db,path));
}

  app$.innerHTML = `
    <div style="max-width:360px;margin:40px auto">
      <div style="text-align:center;margin-bottom:40px">
        <svg viewBox="0 0 300 20" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:300px;height:auto;margin-bottom:24px">
          <defs>
            <pattern id="greca" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
              <rect x="0" y="5" width="5" height="10" fill="var(--ocean)"/>
              <rect x="5" y="10" width="5" height="10" fill="var(--ocean)"/>
              <rect x="10" y="5" width="5" height="10" fill="var(--ocean)"/>
              <rect x="15" y="0" width="5" height="10" fill="var(--ocean)"/>
            </pattern>
          </defs>
          <rect width="300" height="20" fill="url(#greca)"/>
        </svg>
        <h1 style="font-size:48px;margin:0">Plan<strong style="color:var(--ocean)">Wise</strong></h1>
        <p class="faint" style="font-size:13px;margin-top:8px">Collaborative trip planning</p>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn btn-ghost" data-tab="signup" style="flex:1">Sign up</button>
        <button class="btn btn-ghost" data-tab="login" style="flex:1">Log in</button>
      </div>
      <div id="auth-box" class="card pad"></div>
      <div id="err1" class="err"></div>
    </div>`;
  paintAuth();

  if(state.authTab==="signup"){
    box.innerHTML = `
      <p class="eyebrow">Create account</p>
      <h2 style="margin-bottom:14px">Your name</h2>
      <label class="fld"><span>Your name</span><input id="au-name" placeholder="Mateo Baraldi"></label>

    box.innerHTML = `
      <p class="eyebrow">Log in</p>

      <label class="fld"><span>Your name</span><input id="au-name" placeholder="Mateo Baraldi"></label>
      <label class="fld"><span>Password</span><input id="au-pass" type="password" placeholder="••••••"></label>
      <button class="btn btn-primary" data-act="login" style="width:100%">Log in</button>`;

function dashboardShell(){
  app$.innerHTML = `
    <div class="dash-top">
      <div><p class="eyebrow">Your trips</p><h2 class="h-sec">Plan the journey</h2></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" data-act="new-trip">＋ New trip</button>
      </div>
    </div>
    <div id="trip-grid-wrap"><p class="muted">Loading your trips…</p></div>

    <div id="new-trip-box" class="card pad hide" style="margin-top:22px">
      <p class="eyebrow">Start a trip</p>
      <h2 class="h-sec" style="margin-bottom:14px">You'll own the trip</h2>
      <div id="err2" class="err"></div>

      <label class="fld"><span>How many days?</span><input id="nt-days" type="number" value="3" min="1" max="30"></label>
      <label class="fld"><span>Your family's name</span><input id="nt-fam" placeholder="The Baraldis"></label>
      <p class="faint" style="font-size:12px;margin:-6px 0 14px">A trip holds several families. This creates yours — invite others with the trip code.</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" data-act="create-trip">Create trip</button>

      </div>
    </div>

    <div class="card pad" style="margin-top:22px">
      <p class="eyebrow">Got an invite?</p>

      <p class="faint" style="font-size:13px;margin:0 0 14px">A <b>family code</b> adds you to a household. A <b>trip code</b> brings a new family onto a trip.</p>
      <div id="err3" class="err"></div>
      <div class="join-row">
        <label class="fld"><span>Family code</span><input id="join-fam" placeholder="TRIP-XXXXXX" style="font-family:'Space Mono';letter-spacing:.1em;text-transform:uppercase"></label>

      </div>
      <div class="divider">or bring a family to a trip</div>
      <div class="join-row">
        <label class="fld"><span>Trip code</span><input id="join-trip" placeholder="TRIP-XXXXXX" style="font-family:'Space Mono';letter-spacing:.1em;text-transform:uppercase"></label>
        <label class="fld"><span>Your family's name</span><input id="join-trip-fam" placeholder="The Gómez family"></label>
        <button class="btn btn-ghost" data-act="join-trip">Join trip</button>
      </div>
    </div>`;
}

async function paintTrips(){
  if(!tripsLoaded||!famsLoaded) return;
  const wrap = $("#trip-grid-wrap"); if(!wrap) return;
  const m = me();
  const myTripIds = new Set(Object.values(allFams).filter(f=>f && f.members && f.members[m]).map(f=>f.tripId));
  const trips = Object.values(allTrips).filter(t=>t && myTripIds.has(t.id)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(!trips.length){
    wrap.innerHTML = `<div class="empty"><div style="font-size:34px">🗺️</div><h3>No trips yet</h3>
      <p class="muted" style="max-width:42ch;margin:0 auto 4px">Start a trip to gather families and plans — or join one with a code.</p></div>`;
    return;
  }
  await ensureNames(trips.flatMap(t=>travelersOfTrip(t.id)));
  wrap.innerHTML = `<div class="trip-grid">${trips.map(t=>{
    const owner = t.owner===m;
    const fams = famsOfTrip(t.id), trav = travelersOfTrip(t.id);
    const shown = trav.slice(0,4), extra = trav.length-shown.length;
    const avs = shown.map(x=>`<span class="av">${esc(initials(nameOf(x)))}</span>`).join("")+(extra>0?`<span class="av more">+${extra}</span>`:"");
    return `<button class="trip-card" data-open="${t.id}"><div class="band"></div><div class="fc-body">
      ${owner?`<span class="pill owner">★ You own this</span>`:`<span class="pill">Traveler</span>`}
      <h3>${esc(t.name)}</h3>
      <div class="muted" style="font-size:13.5px">📍 ${esc(t.destination)}</div>
      <div class="faint" style="font-size:12.5px;margin-top:4px">${fams.length} ${fams.length===1?'family':'families'} · ${trav.length} ${trav.length===1?'traveler':'travelers'}</div>
      <div class="avatars">${avs}</div></div></button>`;
  }).join("")}</div>`;
}

function enterDashboard(){
  clearListeners(); state.view="dashboard"; state.tripId=null;
  tripsLoaded=famsLoaded=false; dashboardShell();
  const onErr = ()=>{ const w=$("#trip-grid-wrap"); if(w) w.innerHTML=`<p class="err">Couldn't reach the database. Check your Firebase config and rules.</p>`; };
  activeListeners.push(onValue(P(db,"trips"), s=>{ allTrips=s.val()||{}; tripsLoaded=true; paintTrips(); }, onErr));
  activeListeners.push(onValue(P(db,"families"), s=>{ allFams=s.val()||{}; famsLoaded=true; paintTrips(); }, onErr));
}

function tripShell(trip, owner){
  app$.innerHTML = `
    <button class="back" data-act="back">← All trips</button>
    <div class="fam-hero">
      <div>
        <p class="eyebrow">${owner?"You own this trip":"You're on this trip"}</p>
        <h2>${esc(trip.name)}</h2>
        <div class="muted" id="hero-count">📍 ${esc(trip.destination)}</div>
      </div>

async function paintPlans(){
  const el = $("#plan-list"); if(!el) return;
  if(!curPlans.length){ el.innerHTML=`<p class="faint">No plans yet. Start adding ideas!</p>`; return; }
  
  const m = me();
  const dayKeys = Object.keys(curTrip.days||{}).sort((a,b)=>parseInt(a)-parseInt(b));
  const byDay = {TBD:[]};
  dayKeys.forEach(d=>byDay["Day "+d]=[]);
  curPlans.forEach(p=>{ const k = p.day||"TBD"; if(!byDay[k]) byDay[k]=[]; byDay[k].push(p); });
  
  for(let day of ["TBD",...dayKeys.map(d=>"Day "+d)]){
    const plans = byDay[day]||[];
    if(!plans.length) continue;
    const sorted = [...plans].sort((a,b)=>(Object.keys(b.votes||{}).length)-(Object.keys(a.votes||{}).length));
    const topVotes = sorted[0] ? Object.keys(sorted[0].votes||{}).length : 0;
    
    el.innerHTML += `<div class="plan-day-header">${day}</div>`;
    sorted.forEach((p,i)=>{
      const votes = Object.keys(p.votes||{}).length;
      const voted = p.votes && p.votes[m];
      const isTop = i===0 && topVotes>0;
      const canDel = p.addedBy===m || curTrip.owner===m || isAdmin();
      el.innerHTML += `<div class="plan-item ${voted?'voted':''} ${isTop?'top':''}">
        <div class="plan-header">
          <div>
            <div class="plan-title">${esc(p.title)}</div>
            <span class="plan-cat">${esc(p.cat)}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="vote-btn ${voted?'voted':''}" data-vote="${esc(p.id)}" title="Vote">${voted?'▼':'▲'}</button>
          </div>
        </div>
        ${p.note?`<div class="plan-note">${esc(p.note)}</div>`:""}
        ${p.img?`<img src="${p.img}" style="max-width:100%;border-radius:6px;margin-top:8px">`:""}
        ${p.link?`<div style="font-size:12px;margin-top:6px"><a href="${esc(p.link)}" target="_blank" style="color:var(--ocean)">Open link ↗</a></div>`:""}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="plan-votes">${isTop?'★':'🔸'} ${votes} ${votes===1?'vote':'votes'}</div>
          <div class="plan-actions">
            <button class="btn btn-ghost btn-sm" data-act="edit-plan" data-editplan="${esc(p.id)}">Edit</button>
            ${canDel?`<button class="btn btn-ghost btn-sm" data-act="del-plan" data-delplan="${esc(p.id)}">Remove</button>`:""}
          </div>
        </div>
      </div>`;
    });
  }
  
  const cnt = $("#plan-count"); if(cnt) cnt.textContent = `${curPlans.length} ${curPlans.length===1?'plan':'plans'}`;
}

function handleImageFile(file){
  if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    let data = e.target.result;
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = 320; c.height = 240;
      c.getContext("2d").drawImage(img, 0, 0, 320, 240);
      data = c.toDataURL("image/jpeg", 0.7);
      $("#p-img").value = data;
      uploadData = data;
      $("#img-preview").innerHTML = `<img src="${data}" style="max-width:100%;border-radius:6px">`;
    };
    img.src = data;
  };
  r.readAsDataURL(file);
}

function goTrip(id){
  clearListeners();
  state.view="trip"; state.tripId=id;
  curTrip=null; curFams=[]; curPlans=[]; editingPlanId=null; shellDone=false;
  
  const onErr = ()=>{ app$.innerHTML=`<p class="err">Couldn't reach the database. Check your Firebase config and rules.</p>`; };
  
  let families$ = onValue(P(db,"families"), s=>{
    const all = s.val()||{};
    curFams = Object.values(all).filter(f=>f && f.tripId===id);
    const iAmIn = curFams.some(f=>f.members && f.members[m()]);
    if(curFams.length && !iAmIn){ toast("You're no longer on this trip."); goDashboard(); return; }
    ensureNames(curFams.flatMap(f=>[f.owner, ...Object.keys(f.members||{})])).then(() => {
      if(curTrip) { paintHeroCount(); paintFamilies(curTrip.owner===me()); }
    });
  }, onErr);
  activeListeners.push(() => families$());
  
  let plans$ = onValue(P(db,"plans/"+id), s=>{
    const v = s.val()||{};
    curPlans = Object.entries(v).map(([pid,p])=>({id:pid,...p}));
    if(curTrip) paintPlans();
  }, onErr);
  activeListeners.push(() => plans$());
  
  let trips$ = onValue(P(db,"trips/"+id), s=>{
    const t = s.val();
    if(!t){ toast("This trip no longer exists."); goDashboard(); return; }
    t.id=id; curTrip=t; 
    const owner = curTrip.owner===me();
    if(!shellDone){ tripShell(curTrip, owner); shellDone=true; }
    paintHeroCount(); paintEditButton(); paintTripCode(owner); if(owner){ paintAdmins(); paintMakeAdmin(); } paintFamilies(owner); paintPlans(); paintDaySelector();
  }, onErr);
  activeListeners.push(() => trips$());
}

function goDashboard(){ state.view="dashboard"; state.tripId=null; enterDashboard(); }

app$.addEventListener("click", async e => {
  const a = e.target.dataset.act;
  
  if(a==="signup"){ setErr("err1","");

    if(!pass || pass.length<4){ setErr("err1","Password must be at least 4 characters."); return; }
    const u = allUsers[name.toLowerCase()]; if(u){ setErr("err1","That name is taken."); return; }
    const newUser = { name, displayName:name, pass:sha256(pass), createdAt:Date.now() };

    const modal = $("#share-modal");
    const link = `${window.location.origin}${window.location.pathname}?join-trip=${curTrip.code}`;
    $("#share-title").textContent = `Share "${curTrip.name}"`;
    $("#share-link").value = link;
    if(modal) modal.classList.remove("hide");
    return;
  }

  if(a==="share-fam"){ 
    const fid = e.target.dataset.fam;
    const fam = curFams.find(f=>f.id===fid);
    if(!fam) return;
    const modal = $("#share-modal");
    const link = `${window.location.origin}${window.location.pathname}?join-fam=${fam.code}`;
    $("#share-title").textContent = `Share "${fam.name}"`;
    $("#share-link").value = link;
    if(modal) modal.classList.remove("hide");
    return;
  }

  if(a==="copy-share-link"){ 
    const input = $("#share-link");
    if(input) {
      input.select();
      document.execCommand("copy");
      toast("Link copied to clipboard!");
    }
    return;
  }

  if(a==="close-share"){ 
    const modal = $("#share-modal");
    if(modal) modal.classList.add("hide");
    return;
  }

  if(a==="make-admin"){ const user = e.target.dataset.user; await setAdmin(state.tripId, user, true); toast(nameOf(user)+" is now an admin!"); return; }
  if(a==="remove-admin"){ const user = e.target.dataset.user; await setAdmin(state.tripId, user, false); toast(nameOf(user)+" is no longer an admin."); return; }
});

app$.addEventListener("click", (e)=>{
  if(e.target.id==="edit-trip-modal"){ $("#edit-trip-modal").classList.add("hide"); }
  if(e.target.id==="edit-plan-modal"){ $("#edit-plan-modal").classList.add("hide"); editingPlanId=null; uploadPlanData=null; }
  if(e.target.id==="share-modal"){ $("#share-modal").classList.add("hide"); }
});

document.addEventListener("change",(e)=>{ 
  if(e.target && e.target.id==="p-file"){ handleImageFile(e.target.files && e.target.files[0]); }
  if(e.target && e.target.id==="ep-file"){ handlePlanImageFile(e.target.files && e.target.files[0]); }
});

async function joinFamily(code){
  const snap = await getVal(P(db,"famcodes/"+code.toUpperCase()));
  if(!snap.val()) return "Code not found.";
  const fid = snap.val();
  const m = me();
  await setVal(P(db,"families/"+fid+"/members/"+m), true);
  return null;
}

async function joinTrip(code, famName){
  const snap = await getVal(P(db,"tripcodes/"+code.toUpperCase()));
  if(!snap.val()) return "Code not found.";
  const tid = snap.val();
  const m = me();
  const fid = uid(), fcode = genCode();
  const fam = { id:fid, tripId:tid, name:famName.trim(), owner:m, ownerName:state.user.displayName, createdAt:Date.now(), code:fcode, members:{[m]:true} };
  await setVal(P(db,"families/"+fid), fam);
  await update(P(db,"trips/"+tid+"/families"), {[fid]:true});
  await setVal(P(db,"famcodes/"+fcode), fid);
  return null;
}

const onErr = ()=>{ app$.innerHTML=`<p class="err">Couldn't reach the database. Check your Firebase config and rules.</p>`; };
onValue(P(db,"users"), s=>{ allUsers=s.val()||{}; }, onErr);

authShell();
</script>
