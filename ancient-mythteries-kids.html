<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Mythteries</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --teal:    #2aafaa;
            --teal-dk: #1a8580;
            --orange:  #e8620a;
            --gold:    #f0a500;
            --amber:   #f5c842;
            --rust:    #c0451a;
            --brown:   #7a3b1e;
            --cream:   #fdf6e3;
            --sand:    #f5e6c0;
            --sky:     #e0f7f6;
        }

        body {
            background: var(--sky);
            color: #3a2010;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            position: relative;
            text-align: center;
            padding: 48px 24px 280px;
            background: linear-gradient(180deg, #b8eeeb 0%, #d4f5f2 60%, #e8faf8 100%);
            overflow: hidden;
        }

        .logo-img {
            width: min(260px, 70vw);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(42,175,170,0.3), 0 2px 8px rgba(0,0,0,0.15);
            margin-bottom: 24px;
            border: 4px solid #fff;
        }

        .tagline {
            font-size: 16px;
            color: var(--teal-dk);
            font-weight: 600;
            max-width: 380px;
            margin: 0 auto 28px;
        }

        .listen-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .listen-links a {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            background: var(--teal);
            border: 2px solid var(--teal-dk);
            padding: 9px 20px;
            border-radius: 50px;
            transition: all 0.2s;
        }

        .listen-links a:hover {
            background: var(--orange);
            border-color: var(--rust);
            transform: translateY(-2px);
        }

        /* ── MAYAN SCENE ── */
        .scene {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        /* ── MAYAN BORDER STRIPE ── */
        .mayan-stripe {
            height: 20px;
            background: repeating-linear-gradient(
                90deg,
                var(--orange) 0px, var(--orange) 20px,
                var(--gold) 20px, var(--gold) 40px,
                var(--teal) 40px, var(--teal) 60px,
                var(--rust) 60px, var(--rust) 80px,
                var(--amber) 80px, var(--amber) 100px,
                var(--teal-dk) 100px, var(--teal-dk) 120px
            );
        }

        /* ── EPISODES ── */
        .episodes-section {
            max-width: 740px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .section-label {
            font-family: 'Bangers', cursive;
            font-size: 34px;
            letter-spacing: 3px;
            color: var(--teal-dk);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 3px;
            border-radius: 2px;
        }
        .section-label::before { background: linear-gradient(90deg, transparent, var(--teal)); }
        .section-label::after  { background: linear-gradient(90deg, var(--orange), transparent); }

        /* Card accent colors cycling */
        .episode-card { --accent: var(--teal); }
        .episode-card:nth-child(2) { --accent: var(--orange); }
        .episode-card:nth-child(3) { --accent: var(--gold); }
        .episode-card:nth-child(4) { --accent: var(--rust); }
        .episode-card:nth-child(5) { --accent: var(--teal-dk); }
        .episode-card:nth-child(6) { --accent: #8b5e3c; }

        .episode-card {
            background: #fff;
            border: 2.5px solid var(--accent);
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 18px;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: 20px;
            align-items: start;
            box-shadow: 4px 4px 0 var(--accent);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .episode-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--accent);
        }

        .ep-number {
            font-family: 'Bangers', cursive;
            font-size: 14px;
            letter-spacing: 1px;
            color: #fff;
            background: var(--accent);
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            flex-shrink: 0;
        }

        .ep-number .ep-label {
            font-size: 9px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .ep-number .ep-num {
            font-size: 22px;
        }

        .ep-body h2 {
            font-family: 'Bangers', cursive;
            font-size: 22px;
            letter-spacing: 1px;
            color: var(--brown);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .ep-date {
            font-size: 11px;
            color: var(--teal-dk);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .ep-desc {
            font-size: 14px;
            color: #6b4c2a;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        audio {
            width: 100%;
            height: 36px;
            border-radius: 50px;
            accent-color: var(--accent);
        }

        .no-episodes {
            background: #fff;
            border: 2.5px dashed var(--teal);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            color: var(--teal-dk);
            font-size: 15px;
            font-weight: 600;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--brown);
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: var(--sand);
            font-weight: 500;
            letter-spacing: 1px;
        }

        episode { display: none; }
    </style>
</head>

<script>
    const episodes = Array.from(document.querySelectorAll('episode'))
        .sort((a, b) => Number(b.getAttribute('number')) - Number(a.getAttribute('number')));

    const list = document.getElementById('episode-list');

    if (episodes.length === 0) {
        list.innerHTML = '<div class="no-episodes">🏛️ No episodes yet — add your first one in the HTML!</div>';
    } else {
        episodes.forEach(ep => {
            const num   = ep.getAttribute('number');
            const title = ep.getAttribute('title');
            const date  = ep.getAttribute('date');
            const audio = ep.getAttribute('audio');
            const desc  = ep.textContent.trim();

            const card = document.createElement('div');
            card.className = 'episode-card';
            card.innerHTML = `
                <div class="ep-number">
                    <span class="ep-label">EP</span>
                    <span class="ep-num">${num}</span>
                </div>
                <div class="ep-body">
                    <h2>${title}</h2>
                    <p class="ep-date">${date}</p>
                    <p class="ep-desc">${desc}</p>
                    ${audio ? `<audio controls src="${audio}"></audio>` : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }
</script>

</body>
</html>
